<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ER Diagram — Alibaba Scammers DB</title>
<style>
  :root {
    --bg: #f4f6fa;
    --card-bg: #ffffff;
    --ink: #1f2733;
    --muted: #707a8a;
    --line: #cdd5e0;
    --shadow: 0 1px 3px rgba(20,30,50,.10), 0 6px 20px rgba(20,30,50,.08);
    --reports: #2563eb;
    --reports-soft: rgba(37,99,235,.08);
    --reports-zone: rgba(37,99,235,.05);
    --fk-tint: rgba(245,158,11,.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
  }
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 20;
    display: flex; align-items: center; gap: 12px; padding: 0 16px;
    background: rgba(255,255,255,.85); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  #toolbar h1 { font-size: 14px; font-weight: 650; margin: 0; letter-spacing: .2px; }
  #toolbar .sub { font-size: 12px; color: var(--muted); margin-right: auto; }
  #toolbar input[type=search] {
    width: 220px; padding: 7px 11px; font-size: 13px;
    border: 1px solid var(--line); border-radius: 8px; outline: none; background: #fff;
  }
  #toolbar input[type=search]:focus { border-color: var(--reports); box-shadow: 0 0 0 3px var(--reports-soft); }
  #toolbar button {
    font-size: 13px; padding: 7px 12px; border: 1px solid var(--line);
    background: #fff; border-radius: 8px; cursor: pointer; color: var(--ink);
  }
  #toolbar button:hover { background: #f0f3f8; }
  #stage { position: absolute; inset: 0; cursor: grab; }
  #stage.panning { cursor: grabbing; }
  #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
  svg#edges { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; z-index: 1; }

  .zone {
    position: absolute; border-radius: 18px; z-index: 0;
    border: 1.5px dashed var(--line);
  }
  .zone .zone-label {
    position: absolute; top: 14px; left: 18px; font-size: 13px; font-weight: 700;
    letter-spacing: .4px; text-transform: uppercase; opacity: .75;
  }

  .table {
    position: absolute; z-index: 2; width: 300px;
    background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow);
    border: 1px solid var(--line); overflow: hidden;
    transition: opacity .15s ease;
  }
  .table .thead {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 13px; color: #fff; font-weight: 650; font-size: 14px;
  }
  .table .thead .cols { margin-left: auto; font-size: 11px; font-weight: 500; opacity: .85; }
  .row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 13px; font-size: 12.5px; border-top: 1px solid #eef1f6;
  }
  .row .cname { font-weight: 550; }
  .row .ctype {
    margin-left: auto; font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 11px; color: var(--muted); white-space: nowrap;
  }
  .row.is-fk { background: var(--fk-tint); }
  .badge {
    font-size: 9.5px; font-weight: 700; letter-spacing: .3px;
    padding: 1px 5px; border-radius: 4px; line-height: 1.5;
  }
  .b-pk { background: #fde68a; color: #92400e; }
  .b-fk { background: #fed7aa; color: #9a3412; }
  .b-u  { background: #c7d2fe; color: #3730a3; }
  .b-mn { background: #ddd6fe; color: #5b21b6; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }

  .legend {
    position: fixed; bottom: 14px; left: 16px; z-index: 20;
    background: rgba(255,255,255,.92); border: 1px solid var(--line);
    border-radius: 10px; padding: 11px 13px; font-size: 11.5px; color: var(--muted);
    box-shadow: var(--shadow); max-width: 320px;
  }
  .legend b { color: var(--ink); display: block; margin-bottom: 6px; font-size: 12px; }
  .legend .lrow { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  .legend svg { flex: none; }
  .dim { opacity: .15; }
  .edge-dim { opacity: .08; }
</style>
</head>
<body>
  <div id="toolbar">
    <h1>Alibaba Scammers — ER Diagram</h1>
    <span class="sub">PostgreSQL · Drizzle ORM · 1 table</span>
    <input id="search" type="search" placeholder="Search tables / columns…" />
    <button id="zin">Zoom In</button>
    <button id="zout">Zoom Out</button>
    <button id="fit">Fit</button>
  </div>

  <div id="stage">
    <div id="world">
      <svg id="edges"></svg>
      <!-- zones + tables injected by JS -->
    </div>
  </div>

  <div class="legend">
    <b>Legend</b>
    <div class="lrow"><svg width="34" height="10"><line x1="0" y1="5" x2="34" y2="5" stroke="#64748b" stroke-width="2"/></svg> solid = explicit / declared FK</div>
    <div class="lrow"><svg width="34" height="10"><line x1="0" y1="5" x2="34" y2="5" stroke="#64748b" stroke-width="2" stroke-dasharray="5 4"/></svg> dashed = implicit FK (no constraint)</div>
    <div class="lrow"><svg width="34" height="10"><line x1="0" y1="5" x2="34" y2="5" stroke="#7c3aed" stroke-width="2" stroke-dasharray="2 3"/></svg> dotted = polymorphic FK</div>
    <div class="lrow"><span class="badge b-pk">PK</span> primary &nbsp; <span class="badge b-fk">FK</span> foreign &nbsp; <span class="badge b-u">U</span> unique</div>
  </div>

<script>
// ---- Model -------------------------------------------------------------
const DOMAINS = {
  reports: { label: "Reports", color: "#2563eb", zone: "rgba(37,99,235,.05)" },
};

const TABLES = [
  {
    name: "reports",
    domain: "reports",
    x: 80, y: 90,
    columns: [
      { name: "id",           type: "uuid",        pk: true,  notnull: true,  def: "gen_random_uuid()" },
      { name: "created_at",   type: "timestamptz", notnull: true,  def: "now()" },
      { name: "updated_at",   type: "timestamptz", notnull: false },
      { name: "platform",     type: "text",        notnull: true,  def: "'alibaba'" },
      { name: "seller_name",  type: "text",        notnull: true },
      { name: "seller_url",   type: "text",        notnull: true },
      { name: "product_name", type: "text",        notnull: true },
      { name: "product_url",  type: "text",        notnull: true },
      { name: "quantity",     type: "numeric",     notnull: true },
      { name: "total_price",  type: "numeric",     notnull: true },
      { name: "currency",     type: "text",        notnull: true },
      { name: "industry",     type: "text",        notnull: true },
      { name: "details",      type: "text",        notnull: true },
      { name: "status",       type: "text enum",   notnull: true,  def: "'pending'" },
      { name: "slug",         type: "text",        notnull: true,  uniq: true },
    ],
  },
];

// FK relationships: { from, fromCol, to, kind: 'explicit'|'implicit'|'poly' }
const RELS = [];

// ---- Render tables -----------------------------------------------------
const world = document.getElementById("world");
const svg = document.getElementById("edges");
const nodeEls = {};

function rowBadges(c) {
  let b = "";
  if (c.pk) b += `<span class="badge b-pk">PK</span>`;
  if (c.fk) b += `<span class="badge b-fk">FK</span>`;
  if (c.uniq) b += `<span class="badge b-u">U</span>`;
  return b;
}

TABLES.forEach(t => {
  const dom = DOMAINS[t.domain];
  const el = document.createElement("div");
  el.className = "table";
  el.style.left = t.x + "px";
  el.style.top  = t.y + "px";
  el.dataset.name = t.name;

  const cols = t.columns.map(c => `
    <div class="row ${c.fk ? "is-fk" : ""}" data-col="${c.name}">
      <span class="dot" style="background:${dom.color}"></span>
      <span class="cname">${c.name}</span>
      ${rowBadges(c)}
      <span class="ctype">${c.type}${c.notnull ? "" : "?"}</span>
    </div>`).join("");

  el.innerHTML = `
    <div class="thead" style="background:${dom.color}">
      <span>${t.name}</span>
      <span class="cols">${t.columns.length} cols</span>
    </div>
    ${cols}`;
  world.appendChild(el);
  nodeEls[t.name] = el;
});

// ---- Zones (domain backgrounds) ---------------------------------------
const PAD = 34;
function layoutZones() {
  document.querySelectorAll(".zone").forEach(z => z.remove());
  const byDom = {};
  TABLES.forEach(t => (byDom[t.domain] ??= []).push(nodeEls[t.name]));
  Object.entries(byDom).forEach(([dom, els]) => {
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    els.forEach(e => {
      const x=e.offsetLeft, y=e.offsetTop, w=e.offsetWidth, h=e.offsetHeight;
      minX=Math.min(minX,x); minY=Math.min(minY,y);
      maxX=Math.max(maxX,x+w); maxY=Math.max(maxY,y+h);
    });
    const z = document.createElement("div");
    z.className = "zone";
    z.style.left=(minX-PAD)+"px"; z.style.top=(minY-PAD-22)+"px";
    z.style.width=(maxX-minX+PAD*2)+"px"; z.style.height=(maxY-minY+PAD*2+22)+"px";
    z.style.background = DOMAINS[dom].zone;
    z.style.borderColor = DOMAINS[dom].color + "55";
    z.innerHTML = `<span class="zone-label" style="color:${DOMAINS[dom].color}">${DOMAINS[dom].label}</span>`;
    world.insertBefore(z, world.firstChild.nextSibling);
  });
}

// ---- Edges -------------------------------------------------------------
function drawEdges() {
  svg.innerHTML = `
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
      </marker>
    </defs>`;
  RELS.forEach(r => {
    const a = nodeEls[r.from], b = nodeEls[r.to];
    if (!a || !b) return;
    const ax = a.offsetLeft + a.offsetWidth, ay = a.offsetTop + 24;
    const bx = b.offsetLeft, by = b.offsetTop + 24;
    const dx = Math.max(40, Math.abs(bx-ax)/2);
    const stroke = r.kind === "poly" ? "#7c3aed" : "#64748b";
    const dash = r.kind === "explicit" ? "" : r.kind === "implicit" ? "5 4" : "2 3";
    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d", `M${ax},${ay} C${ax+dx},${ay} ${bx-dx},${by} ${bx},${by}`);
    p.setAttribute("fill","none"); p.setAttribute("stroke",stroke);
    p.setAttribute("stroke-width","2"); if(dash) p.setAttribute("stroke-dasharray",dash);
    p.setAttribute("marker-end","url(#arrow)");
    svg.appendChild(p);
  });
}

layoutZones();
drawEdges();

// ---- Pan & Zoom --------------------------------------------------------
const stage = document.getElementById("stage");
let scale=1, tx=0, ty=0;
function apply(){ world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }

let panning=false, sx=0, sy=0, ox=0, oy=0;
stage.addEventListener("mousedown", e => {
  if (e.target.closest(".table")) return;
  panning=true; stage.classList.add("panning"); sx=e.clientX; sy=e.clientY; ox=tx; oy=ty;
});
window.addEventListener("mousemove", e => {
  if(!panning) return; tx=ox+(e.clientX-sx); ty=oy+(e.clientY-sy); apply();
});
window.addEventListener("mouseup", () => { panning=false; stage.classList.remove("panning"); });

stage.addEventListener("wheel", e => {
  e.preventDefault();
  const rect = stage.getBoundingClientRect();
  const mx = e.clientX-rect.left, my = e.clientY-rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 1/1.1;
  const ns = Math.min(2.5, Math.max(0.2, scale*factor));
  tx = mx - (mx-tx)*(ns/scale); ty = my - (my-ty)*(ns/scale);
  scale = ns; apply();
}, { passive:false });

function fit() {
  const els = Object.values(nodeEls);
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  els.forEach(e=>{ minX=Math.min(minX,e.offsetLeft); minY=Math.min(minY,e.offsetTop);
    maxX=Math.max(maxX,e.offsetLeft+e.offsetWidth); maxY=Math.max(maxY,e.offsetTop+e.offsetHeight); });
  minX-=70; minY-=70; maxX+=70; maxY+=70;
  const vw=stage.clientWidth, vh=stage.clientHeight;
  scale = Math.min(2, Math.min(vw/(maxX-minX), vh/(maxY-minY)));
  tx = (vw-(maxX-minX)*scale)/2 - minX*scale;
  ty = (vh-(maxY-minY)*scale)/2 - minY*scale + 20;
  apply();
}
document.getElementById("zin").onclick  = ()=>{ scale=Math.min(2.5,scale*1.2); apply(); };
document.getElementById("zout").onclick = ()=>{ scale=Math.max(0.2,scale/1.2); apply(); };
document.getElementById("fit").onclick  = fit;

// ---- Hover highlight ---------------------------------------------------
const relMap = {};
RELS.forEach(r => { (relMap[r.from] ??= new Set()).add(r.to); (relMap[r.to] ??= new Set()).add(r.from); });
Object.entries(nodeEls).forEach(([name, el]) => {
  el.addEventListener("mouseenter", () => {
    const keep = new Set([name, ...(relMap[name]||[])]);
    Object.entries(nodeEls).forEach(([n,e]) => e.classList.toggle("dim", !keep.has(n)));
    [...svg.querySelectorAll("path")].forEach((p,i) => {
      const r = RELS[i]; if(!r) return;
      p.classList.toggle("edge-dim", r.from!==name && r.to!==name);
    });
  });
  el.addEventListener("mouseleave", () => {
    Object.values(nodeEls).forEach(e=>e.classList.remove("dim"));
    svg.querySelectorAll("path").forEach(p=>p.classList.remove("edge-dim"));
  });
});

// ---- Search ------------------------------------------------------------
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  Object.entries(nodeEls).forEach(([name, el]) => {
    if(!q){ el.classList.remove("dim"); return; }
    const t = TABLES.find(t=>t.name===name);
    const hit = name.includes(q) || t.columns.some(c=>c.name.toLowerCase().includes(q));
    el.classList.toggle("dim", !hit);
  });
});

// ---- Init --------------------------------------------------------------
window.addEventListener("load", fit);
fit();
</script>
</body>
</html>

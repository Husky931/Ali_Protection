<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scam Reports — Bad seller alerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f3ef;
        --bg-2: #efece5;
        --ink: #121212;
        --ink-2: #2a2a2a;
        --muted: #6b7280;
        --muted-2: #9ca3af;
        --line: #e2ddd2;
        --line-2: #d8d3c6;
        --card: #fffdf8;
        --accent: oklch(0.68 0.19 48); /* construction-cone orange */
        --accent-ink: oklch(0.42 0.17 42);
        --accent-soft: oklch(0.94 0.05 60);
        --accent-soft-2: oklch(0.97 0.025 65);
        --danger: oklch(0.58 0.21 27);
        --serif: "Newsreader", Georgia, serif;
        --sans: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, monospace;
        --shadow-sm: 0 1px 2px rgba(20, 15, 5, 0.04), 0 1px 1px rgba(20, 15, 5, 0.03);
        --shadow-md: 0 4px 14px rgba(40, 25, 5, 0.06), 0 1px 3px rgba(40, 25, 5, 0.04);
        --shadow-lg: 0 18px 40px rgba(40, 25, 5, 0.1), 0 4px 12px rgba(40, 25, 5, 0.05);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        font-size: 16px;
        line-height: 1.5;
      }
      a {
        color: inherit;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }

      /* Tape / pin / paper-bulletin texture flourish */
      .paper {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow-md);
      }
      .tape {
        position: absolute;
        width: 64px;
        height: 18px;
        background: rgba(255, 220, 130, 0.55);
        border: 1px solid rgba(180, 140, 30, 0.15);
        transform: rotate(-3deg);
        top: -10px;
        left: 24px;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.04);
      }

      /* Marker highlight on the word "Alibaba" */
      .marker {
        background: linear-gradient(180deg, transparent 55%, oklch(0.86 0.16 75 / 0.85) 55%, oklch(0.86 0.16 75 / 0.85) 92%, transparent 92%);
        padding: 0 0.12em;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px 22px;
        font-weight: 600;
        font-size: 15px;
        border-radius: 12px;
        border: 1px solid transparent;
        transition:
          transform 0.12s ease,
          background 0.15s ease,
          box-shadow 0.15s ease,
          border-color 0.15s;
        text-decoration: none;
        line-height: 1;
      }
      .btn-primary {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.1) inset,
          var(--shadow-sm);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }
      .btn-accent {
        background: var(--accent);
        color: #fff;
        border-color: oklch(0.55 0.18 45);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.18) inset,
          var(--shadow-sm);
      }
      .btn-accent:hover {
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: transparent;
        color: var(--ink);
        border-color: var(--line-2);
      }
      .btn-ghost:hover {
        background: rgba(0, 0, 0, 0.04);
      }
      .btn-link {
        background: transparent;
        border: none;
        padding: 0;
        color: var(--ink);
        text-decoration: underline;
        text-decoration-thickness: 1.5px;
        text-underline-offset: 3px;
        font-weight: 500;
      }

      /* Generic chip */
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border: 1px solid var(--line-2);
        border-radius: 999px;
        background: var(--bg-2);
        font-size: 12px;
        color: var(--ink-2);
        font-weight: 500;
        line-height: 1.4;
      }
      .chip-orange {
        background: var(--accent-soft);
        border-color: oklch(0.84 0.1 60);
        color: var(--accent-ink);
      }
      .chip-mono {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: -0.02em;
      }

      /* Layout */
      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 28px;
      }
      .container-narrow {
        max-width: 760px;
        margin: 0 auto;
        padding: 0 28px;
      }

      /* Top nav */
      .nav {
        position: sticky;
        top: 0;
        z-index: 50;
        backdrop-filter: blur(10px);
        background: color-mix(in oklab, var(--bg) 82%, transparent);
        border-bottom: 1px solid var(--line);
      }
      .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: -0.01em;
        font-size: 16px;
      }
      .brand-mark {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: var(--ink);
        color: var(--accent);
        display: grid;
        place-items: center;
        font-family: var(--serif);
        font-style: italic;
        font-weight: 700;
        font-size: 16px;
        box-shadow: var(--shadow-sm);
      }
      .nav-links {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .nav-link {
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink-2);
        text-decoration: none;
        border: none;
        background: transparent;
        cursor: pointer;
      }
      .nav-link:hover {
        background: rgba(0, 0, 0, 0.04);
      }
      .nav-link.active {
        color: var(--ink);
      }

      /* Floating CTA */
      .float-cta {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 60;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 13px 18px 13px 16px;
        background: var(--accent);
        color: #fff;
        border-radius: 999px;
        border: 1px solid oklch(0.55 0.18 45);
        box-shadow:
          0 14px 30px rgba(180, 80, 10, 0.28),
          0 2px 6px rgba(180, 80, 10, 0.18);
        font-weight: 600;
        font-size: 14px;
        transition: transform 0.15s ease;
      }
      .float-cta:hover {
        transform: translateY(-2px);
      }
      .float-cta-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.25);
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.25);
        }
        50% {
          box-shadow: 0 0 0 7px rgba(255, 255, 255, 0.05);
        }
      }

      /* Headlines */
      h1,
      h2,
      h3,
      h4 {
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .display {
        font-family: var(--sans);
        font-weight: 800;
        font-size: clamp(40px, 6vw, 68px);
        line-height: 1.02;
        letter-spacing: -0.035em;
        text-wrap: balance;
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 11px;
        font-weight: 600;
        color: var(--accent-ink);
        font-family: var(--sans);
      }

      /* Forms */
      .field {
        display: block;
        margin-bottom: 18px;
      }
      .label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--ink-2);
        margin-bottom: 6px;
      }
      .label-hint {
        font-weight: 400;
        color: var(--muted);
        margin-left: 6px;
      }
      .input,
      .textarea,
      .select {
        width: 100%;
        padding: 12px 14px;
        background: var(--card);
        border: 1px solid var(--line-2);
        border-radius: 10px;
        font: inherit;
        font-size: 15px;
        color: var(--ink);
        transition:
          border 0.15s,
          box-shadow 0.15s;
      }
      .input:focus,
      .textarea:focus,
      .select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px oklch(0.68 0.19 48 / 0.15);
      }
      .textarea {
        min-height: 160px;
        resize: vertical;
        line-height: 1.55;
      }

      /* Utility */
      .row {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .divider {
        height: 1px;
        background: var(--line);
        margin: 24px 0;
      }

      .muted {
        color: var(--muted);
      }
      .small {
        font-size: 13px;
      }

      /* Section spacing */
      section {
        padding: 80px 0;
      }

      /* Animations */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeUp 0.35s ease-out both;
      }

      /* Slight grain to feel less SaaS */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background-image: radial-gradient(rgba(60, 40, 10, 0.045) 1px, transparent 1px);
        background-size: 3px 3px;
        mix-blend-mode: multiply;
        opacity: 0.5;
      }

      #app {
        position: relative;
        z-index: 2;
      }

      /* Per-page wrappers */
      .page {
        animation: fadeUp 0.25s ease-out both;
      }

      /* Scrollbar polish */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line-2);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      @media (max-width: 720px) {
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
        }
        section {
          padding: 56px 0;
        }
      }
    </style>
  </head>
